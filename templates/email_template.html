<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Job Newsletter</title>
  </head>

  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f6f7fb;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
      "
    >
      <!-- Header -->
      <h1 style="text-align: center">Craig's Job Newsletter 💼</h1>
      <p style="text-align: center; color: gray">
        Opportunities curated just for you!
      </p>

      <hr />

      <!-- Jobs -->
      <h3>Latest matches:</h3>

      <ul style="list-style: none; padding: 0">
        {{jobs}}
      </ul>

      <hr />

      <!-- Quote -->
      <div style="text-align: center; padding: 15px">
        <p style="font-style: italic; color: #444">Be you. Do you. For you.</p>
      </div>
    </div>
  </body>
</html>
